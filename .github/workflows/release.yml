name: release

on:
  push:
    tags: [ v* ]
  workflow_dispatch:

permissions:
  contents: read

env:
  NUGET_PACKAGES: ${{ github.workspace }}/packages
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-ubuntu1604-native:
    uses: ./.github/workflows/build-ubuntu1604-native-container.yml

  build-windows:
    uses: ./.github/workflows/build-windows.yml

  build:
    needs: [ build-windows, build-ubuntu1604-native ]
    uses: ./.github/workflows/build.yml

  build-nuget-packages:
    needs: [ build-windows, build ]
    uses: ./.github/workflows/build-nuget-packages.yml

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-22.04
    needs: [ build-windows, build, build-nuget-packages ]
    permissions:
      attestations: write
      contents: write
      id-token: write
      artifact-metadata: write
    timeout-minutes: 10
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag: v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag: v8.0.1
        with:
          path: .

      - name: Install zip
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # tag: v1.0.0

      - name: Create ZIP artifacts
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            "alpine-x64 linux-musl-x64"
            "alpine-arm64 linux-musl-arm64"
            "ubuntu-22.04 linux-glibc-x64"
            "ubuntu-22.04-arm linux-glibc-arm64"
            "windows-2022 windows"
            "macos-14 macos"
            "nuget-packages nuget-packages"
          )

          for package in "${packages[@]}"; do
            read -r dir archive <<< "${package}"
            src="./bin-${dir}"
            (cd "${src}" && zip -qq -r "../opentelemetry-dotnet-instrumentation-${archive}.zip" ./* && cd ..)
          done

      - name: Collect install scripts
        shell: bash
        run: |
          set -euo pipefail
          src="./installation-scripts-windows-2022"
          files=(
            "otel-dotnet-auto-install.sh"
            "OpenTelemetry.DotNet.Auto.psm1"
          )

          for file in "${files[@]}"; do
            cp "${src}/${file}" "${file}"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          artifacts=(
            "opentelemetry-dotnet-instrumentation-linux-glibc-arm64.zip"
            "opentelemetry-dotnet-instrumentation-linux-glibc-x64.zip"
            "opentelemetry-dotnet-instrumentation-linux-musl-arm64.zip"
            "opentelemetry-dotnet-instrumentation-linux-musl-x64.zip"
            "opentelemetry-dotnet-instrumentation-macos.zip"
            "opentelemetry-dotnet-instrumentation-nuget-packages.zip"
            "opentelemetry-dotnet-instrumentation-windows.zip"
            "otel-dotnet-auto-install.sh"
            "OpenTelemetry.DotNet.Auto.psm1"
          )

          for file in "${artifacts[@]}"; do
            sha256sum "${file}" >> "./checksums.txt"
          done

          echo "Verifying checksums"
          sha256sum "./checksums.txt" --check || exit 1

      # actions/attest has a hard limit of 1024 subjects per step (no override).
      # Keep attestations split into small batches to stay under this cap.
      - name: Attest release files
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ./*.zip
            ./otel-dotnet-auto-install.sh
            ./OpenTelemetry.DotNet.Auto.psm1
            ./checksums.txt

      - name: Attest bin-alpine-x64
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-alpine-x64/**/*

      - name: Attest bin-alpine-arm64
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-alpine-arm64/**/*

      - name: Attest bin-ubuntu-22.04
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-ubuntu-22.04/**/*

      - name: Attest bin-ubuntu-22.04-arm
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-ubuntu-22.04-arm/**/*

      - name: Attest bin-windows-2022
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-windows-2022/**/*

      - name: Attest bin-macos-14
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-macos-14/**/*

      - name: Attest bin-nuget-packages
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ./bin-nuget-packages/**/*

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --verify-tag --draft
          ./*.zip
          ./otel-dotnet-auto-install.sh
          ./OpenTelemetry.DotNet.Auto.psm1
          ./checksums.txt
