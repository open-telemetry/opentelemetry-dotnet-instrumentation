name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

env:
  NUGET_PACKAGES: ${{ github.workspace }}/packages
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

permissions:
  contents: read

jobs:
  build-ubuntu1604-native:
    name: Build native on Ubuntu 16.04 container
    uses: ./.github/workflows/build-ubuntu1604-native-container.yml

  build-windows:
    name: Build on Windows
    uses: ./.github/workflows/build-windows.yml

  build:
    name: Build
    needs: [ build-windows, build-ubuntu1604-native ]
    uses: ./.github/workflows/build.yml

  build-nuget-packages:
    name: Build NuGet packages
    needs: [ build-windows, build ]
    uses: ./.github/workflows/build-nuget-packages.yml

  test-build-managed:
    name: Test ${{ matrix.test-tfm }} on ${{ matrix.machine }} (managed)
    needs: [ build-windows, build ]
    strategy:
      fail-fast: false
      matrix:
        test-tfm: [ net10.0, net9.0, net8.0, net462 ]
        machine:
        - windows-2022
        - windows-2025
        - macos-14
        - ubuntu-22.04
        - ubuntu-22.04-arm
        exclude:
          - test-tfm: net462
            machine: macos-14
          - test-tfm: net462
            machine: ubuntu-22.04
          - test-tfm: net462
            machine: ubuntu-22.04-arm
        include:
          - machine: windows-2022
            containers: none
            artifact-name: windows-2022
          - machine: windows-2025
            containers: none
            artifact-name: windows-2022
          - machine: ubuntu-22.04
            containers: linux
            artifact-name: ubuntu-22.04
          - machine: macos-14
            containers: none
            artifact-name: macos-14
          - machine: ubuntu-22.04-arm
            containers: linux
            artifact-name: ubuntu-22.04-arm
    runs-on: ${{ matrix.machine }}
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetching all, needed to correctly calculate version
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check for NuGet packages cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: nuget-cache
        with:
          key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Download Artifacts from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bin-${{ matrix.artifact-name }}
          path: bin/tracer-home

      - name: Install SQL Server (localdb)
        if: ${{ runner.os == 'Windows' }}
        uses: potatoqualitee/mssqlsuite@2291d923e83859edd871679c05b379037376761f # v1.12
        with: 
          install: localdb

      - name: Run TestWorkflow
        shell: bash
        env:
          CONTAINERS: ${{ matrix.containers }}
          TEST_TARGET_FRAMEWORK: ${{ matrix.test-tfm }}
        run: ./build.cmd --skip NativeTests --target TestWorkflow --test-target-framework "${TEST_TARGET_FRAMEWORK}" --containers "${CONTAINERS}"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs-${{ matrix.machine }}-${{ matrix.test-tfm }}-containers-${{ matrix.containers }}
          path: test-artifacts/

      - name: Delete SQL Server MSI
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: rm SqlLocalDB.msi

  test-build-native:
    name: Test on ${{ matrix.machine }} (native)
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: windows-2022
            artifact-name: windows-2022
          - machine: windows-2025
            artifact-name: windows-2022
    runs-on: ${{ matrix.machine }}
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetching all, needed to correctly calculate version
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check for NuGet packages cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: nuget-cache
        with:
          key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Download Artifacts from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bin-${{ matrix.artifact-name }}
          path: bin/tracer-home

      - name: Run NativeTests
        run: ./build.cmd NativeTests

  test-build-windows-container-tests:
    name: Test Windows container on ${{ matrix.machine }}
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: windows-2022
            containers: windows-only
            artifact-name: windows-2022
          - machine: windows-2025
            containers: windows-only
            artifact-name: windows-2022
    runs-on: ${{ matrix.machine }}
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetching all, needed to correctly calculate version
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check for NuGet packages cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: nuget-cache
        with:
          key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Download Artifacts from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bin-${{ matrix.artifact-name }}
          path: bin/tracer-home

      - name: Build artifacts required for the test (no native tests)
        shell: bash
        env:
          CONTAINERS: ${{ matrix.containers }}
        run: ./build.cmd --skip RunManagedTests --target ManagedTests --containers "${CONTAINERS}"

      - name: Run the integration tests
        shell: bash
        env:
          CONTAINERS: ${{ matrix.containers }}
        run: ./build.cmd --target RunManagedIntegrationTests --containers "${CONTAINERS}" --test-target-framework net462

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs-${{ matrix.machine }}-containers-${{ matrix.containers }}
          path: test-artifacts/

  test-build-container:
    name: Test in container on ${{ matrix.machine }} (${{ matrix.os-type }}) with ${{ matrix.base-image }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: ubuntu-22.04
            base-image: alpine
            build-source: alpine-x64
            os-type: linux-musl
          - machine: ubuntu-22.04
            base-image: debian
            build-source: ubuntu-22.04
            os-type: linux-glibc
          - machine: ubuntu-22.04
            base-image: centos-stream9
            build-source: ubuntu-22.04
            os-type: linux-glibc
          - machine: ubuntu-22.04-arm
            base-image: alpine
            build-source: alpine-arm64
            os-type: linux-musl
          - machine: ubuntu-22.04-arm
            base-image: debian-arm64
            build-source: ubuntu-22.04-arm
            os-type: linux-glibc
    runs-on: ${{ matrix.machine }}
    timeout-minutes: 60
    steps:

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0 # fetching all, needed to correctly calculate version
        persist-credentials: false

    - name: Download Artifacts from build job
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: bin-${{ matrix.build-source }}
        path: bin/tracer-home

    - name: Build in Docker container
      env:
        BASE_IMAGE: ${{ matrix.base-image }}
        OS_TYPE: ${{ matrix.os-type }}
      run: |
        set -e
        docker build -t mybuildimage -f "./docker/${BASE_IMAGE}.dockerfile" .
        docker run -e HOME=/tmp -e "OS_TYPE=${OS_TYPE}" --user "$(id -u):$(id -g)" --rm --mount type=bind,source="${GITHUB_WORKSPACE}",target=/project mybuildimage \
          /bin/sh -c 'git config --global --add safe.directory /project && ./build.sh TestWorkflow --containers none'

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-logs-container-${{ matrix.machine }}-${{ matrix.base-image }}
        path: test-artifacts/

  test-nuget-packages:
    name: Test NuGet packages on ${{ matrix.machine }}
    needs: build-nuget-packages
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: ubuntu-22.04
          - machine: ubuntu-22.04-arm
          - machine: macos-14
          - machine: windows-2022
          - machine: windows-2025
    runs-on: ${{ matrix.machine }}
    steps:
      
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetching all, needed to correctly calculate version
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check for NuGet packages cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: nuget-cache
        with:
          key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Download NuGet Artifacts from build-nuget-packages job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bin-nuget-packages
          path: bin/nuget-artifacts/

      - name: Test NuGet Packages
        run: ./build.cmd TestNuGetPackages

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs-nuget-packages-${{ matrix.machine }}
          path: test-artifacts/

  test-jobs:
    name: test-jobs # Matches required status check
    runs-on: ubuntu-24.04
    needs:
      - test-build-managed
      - test-build-native
      - test-build-container
      - test-nuget-packages
      - test-build-windows-container-tests
    steps:
      
      - name: Test if test jobs passed
        env:
          TEST_BUILD_MANAGED_RESULT: ${{ needs.test-build-managed.result }}
          TEST_BUILD_NATIVE_RESULT: ${{ needs.test-build-native.result }}
          TEST_BUILD_CONTAINER_RESULT: ${{ needs.test-build-container.result }}
          TEST_NUGET_PACKAGES_RESULT: ${{ needs.test-nuget-packages.result }}
          TEST_BUILD_WINDOWS_CONTAINER_TESTS_RESULT: ${{ needs.test-build-windows-container-tests.result }}
        run: |
          echo "${TEST_BUILD_MANAGED_RESULT}"
          test "${TEST_BUILD_MANAGED_RESULT}" == "success"
          echo "${TEST_BUILD_NATIVE_RESULT}"
          test "${TEST_BUILD_NATIVE_RESULT}" == "success"
          echo "${TEST_BUILD_CONTAINER_RESULT}"
          test "${TEST_BUILD_CONTAINER_RESULT}" == "success"
          echo "${TEST_NUGET_PACKAGES_RESULT}"
          test "${TEST_NUGET_PACKAGES_RESULT}" == "success"
          echo "${TEST_BUILD_WINDOWS_CONTAINER_TESTS_RESULT}"
          test "${TEST_BUILD_WINDOWS_CONTAINER_TESTS_RESULT}" == "success"
