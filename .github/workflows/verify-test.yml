# this workflow can be used to check if given integration test is flaky
name: verify-test

on:
  workflow_dispatch:
    inputs:
      testProject:
        description: String that partially matches test projects to run. Defaults to all test projects.
      testName:
        description: 'String that partially matches the tests to run'
      count:
        description: 'Test execution count'
        default: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-test:
    name: Verify test
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: windows-2022
            containers: windows
          - machine: windows-2025
            containers: windows
          - machine: ubuntu-22.04
            containers: linux
          - machine: ubuntu-22.04-arm
            containers: linux
          - machine: macos-14
            containers: none
    runs-on: ${{ matrix.machine }}
    steps:
      
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Run BuildTracer and ManagedTests
        shell: bash
        env:
          CONTAINERS: ${{ matrix.containers }}
          TEST_COUNT: ${{ github.event.inputs.count }}
          TEST_NAME: ${{ github.event.inputs.testName }}
          TEST_PROJECT: ${{ github.event.inputs.testProject }}
        run: ./build.cmd BuildTracer ManagedTests --containers "${CONTAINERS}" --test-project "${TEST_PROJECT}" --test-name "\"${TEST_NAME}\"" --test-count "${TEST_COUNT}"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-${{ matrix.machine }}
          path: test-artifacts/
