name: Reusable Build

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Artifact suffix for uploaded outputs.
        required: true
        type: string
      runner:
        description: Runner label to execute the build on.
        required: true
        type: string
      environment-type:
        description: Build environment type. Use `host` for direct runner builds or `container` for Docker-based builds.
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile used for container execution.
        required: false
        default: ""
        type: string
      build-target:
        description: Build target to execute.
        required: false
        default: BuildWorkflow
        type: string
      os-type:
        description: Optional OS_TYPE value to publish into the build command environment.
        required: false
        default: ""
        type: string
      replace-artifacts:
        description: Multiline list of replacements in the form <artifact_name>!<path>.
        required: false
        default: ""
        type: string
      log-directory:
        description: Log directory expected to contain profiler output after the smoke test.
        required: false
        default: /var/log/opentelemetry/dotnet
        type: string
      powershell-log-path:
        description: PowerShell log path glob expected to contain profiler output after the Windows PowerShell smoke test.
        required: false
        default: C:\ProgramData\OpenTelemetry .NET AutoInstrumentation\logs\*
        type: string

env:
  NUGET_PACKAGES: ${{ github.workspace }}/packages
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ inputs.artifact-name }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    env:
      SMOKE_TEST_APPLICATION: ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/publish/TestApplication.Smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag: v6.0.2
        with:
          fetch-depth: 0 # fetching all, needed to correctly calculate version

      - name: Set build script
        shell: pwsh
        run: |
          if ('${{ runner.os }}' -eq 'Windows') {
            'BUILD_SCRIPT=./build.ps1' >> $env:GITHUB_ENV
          }
          else {
            'BUILD_SCRIPT=./build.sh' >> $env:GITHUB_ENV
          }

      - name: Prepare build environment
        id: prepare-build-environment
        uses: ./.github/actions/prepare-build-environment
        with:
          artifact-name: ${{ inputs.artifact-name }}
          environment-type: ${{ inputs.environment-type }}
          dockerfile: ${{ inputs.dockerfile }}

      - name: Check for NuGet packages cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag: v5.0.5
        id: nuget-cache
        with:
          key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Restore NuGet packages
        if: ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}
        uses: ./.github/actions/run-command-in-environment
        with:
          container-name: ${{ steps.prepare-build-environment.outputs.container-name }}
          run: ${{ env.BUILD_SCRIPT }} Restore

      - name: Run build target
        env:
          OS_TYPE: ${{ inputs.os-type }}
        uses: ./.github/actions/run-command-in-environment
        with:
          container-name: ${{ steps.prepare-build-environment.outputs.container-name }}
          container-publish-env: ${{ inputs.os-type != '' && 'OS_TYPE' || '' }}
          run: ${{ env.BUILD_SCRIPT }} ${{ inputs.build-target }} --no-restore ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}

      - name: Cache NuGet packages
        if: ${{ steps.nuget-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag: v5.0.5
        with:
          key: ${{ hashFiles('**/Directory.packages.props', './build/LibraryVersions.g.cs', '**/packages.config' ) }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Replace build artifacts
        uses: ./.github/actions/replace-build-artifacts
        with:
          replace-artifacts: ${{ inputs.replace-artifacts }}

      - name: Prepare test environment
        uses: ./.github/actions/prepare-test-environment
        with:
          environment-type: ${{ inputs.environment-type }}
          container-name: ${{ steps.prepare-build-environment.outputs.container-name }}
          log-directory: ${{ inputs.log-directory }}

      - name: Test the Shell scripts from README.md
        uses: ./.github/actions/run-command-in-environment
        with:
          execution-mode: ${{ inputs.environment-type == 'host' && 'bash' || 'container' }}
          container-name: ${{ steps.prepare-build-environment.outputs.container-name }}
          run: |
            dotnet publish -f net10.0 -c Release ./test/test-applications/integrations/TestApplication.Smoke
            export OTEL_DOTNET_AUTO_HOME="${PWD}/bin/tracer-home"
            . ./instrument.sh
            "${{ env.SMOKE_TEST_APPLICATION }}"
            test "$(ls -A '${{ inputs.log-directory }}')"

      - name: Test the Windows PowerShell module instructions from README.md
        if: ${{ inputs.environment-type == 'host' && runner.os == 'Windows' }}
        shell: powershell
        run: |
          $logPath = "${{ inputs.powershell-log-path }}"
          Import-Module "${PWD}/bin/installation-scripts/OpenTelemetry.DotNet.Auto.psm1"
          [System.Environment]::SetEnvironmentVariable("OTEL_DOTNET_AUTO_INSTALL_DIR", "${PWD}/bin/tracer-home", [System.EnvironmentVariableTarget]::Machine)
          Register-OpenTelemetryForCurrentSession -OTelServiceName "MyServiceDisplayName"
          ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/TestApplication.Smoke.exe
          if (-not $?) { throw "dotnet help returned exit code: $LASTEXITCODE" }
          if (-not (Test-Path $logPath)) { throw "Log file does not exist. Instrumentation test failed." }
          Remove-Item $logPath
          Unregister-OpenTelemetryForCurrentSession
          ./test/test-applications/integrations/bin/TestApplication.Smoke/Release/net10.0/TestApplication.Smoke.exe
          if (-not $?) { throw "dotnet help returned exit code: $LASTEXITCODE" }
          if (Test-Path $logPath) { throw "Log file exists. Instrumentation unregister failed." }

      - name: Upload binaries
        if: ${{ always() && (inputs.environment-type != 'container' || !cancelled()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag: v7.0.1
        with:
          name: bin-${{ inputs.artifact-name }}
          path: bin/tracer-home
        continue-on-error: ${{ inputs.environment-type == 'container' }}

      - name: Upload installation scripts
        if: ${{ always() && inputs.environment-type == 'host' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag: v7.0.1
        with:
          name: installation-scripts-${{ inputs.artifact-name }}
          path: bin/installation-scripts

      - name: Regenerate LibraryVersions.g.cs
        uses: ./.github/actions/run-command-in-environment
        with:
          container-name: ${{ steps.prepare-build-environment.outputs.container-name }}
          run: ${{ env.BUILD_SCRIPT }} GenerateLibraryVersionFiles

      - name: Generated files unchanged
        shell: bash
        run: |
          git status
          git config color.diff always
          git --no-pager diff
          [[ -z "$(git status --porcelain)" ]]

      - name: Cleanup build environment
        if: ${{ always() }}
        uses: ./.github/actions/cleanup-build-environment
        with:
          environment-type: ${{ inputs.environment-type }}
          container-name: ${{ steps.prepare-build-environment.outputs.container-name }}
