name: format native

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-native-format:
    name: ${{ matrix.step-name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - step-name: native-format-macos
            # renovate: datasource=github-runners depType=github-runner
            runner: macos-14-xlarge
          - step-name: native-format-linux
            # renovate: datasource=github-runners depType=github-runner
            runner: ubuntu-22.04
          - step-name: native-format-windows
            # renovate: datasource=github-runners depType=github-runner
            runner: windows-2022

    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install Clang tools
      shell: bash
      run: ./scripts/download-clang-tools.sh

    - name: Format native code
      shell: bash
      run: ./scripts/format-native.sh

  check-native-headers:
    name: check-native-headers # Matches required status check
    runs-on: ubuntu-22.04
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23.5'
          cache: false # Suppress a warning given that there are no go.sum files in the repo

      - name: Verify all native files have license headers
        shell: bash
        run: |
          go install github.com/google/addlicense@v1.2.0
          addlicense -v -y "" -l "apache" -c "The OpenTelemetry Authors" -s=only -ignore **/lib/** src/OpenTelemetry.AutoInstrumentation.Native/
          git status
          git diff
          test -z "$(git status --porcelain)"
