name: validate-documentation

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/validate-documentation.yml'
      - '**.md'
      - '.lycheeignore'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/validate-documentation.yml'
      - '**.md'
      - '.lycheeignore'
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Restore lychee cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache-restore
      with:
        path: .lycheecache
        key: cache-lychee-${{ github.sha }}
        restore-keys: cache-lychee-

    - name: Run markdown links checks
      if: ${{ !contains(github.event.pull_request.labels.*.name, 'release PR') }}
      uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
      with:
        fail: true
        args: --cache --cache-exclude-status '403, 429, 500..599' --max-cache-age 1d --threads 1 --max-concurrency 1 --verbose --retry-wait-time 5 --max-retries 3 --timeout 60 --no-progress './**/*.md' './**/*.html'

    - name: Run markdownlint
      uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
      with:
        files: '**/*.md'

    - name: Run cspell
      uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
      with:
        globs: '**/*.md;!.github/**;!lychee/out.md'
        separator: ';'

    - name: Save lychee cache
      if: always()
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .lycheecache
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
